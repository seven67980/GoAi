<!DOCTYPE html>
<html>
<head>
<title>GoAI WT Assistant</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="chat-container">
    <h1>GoAI War Thunder Assistant</h1>
    <div id="chatbox"></div>
    <input id="question" placeholder="Ask about a plane or compare: MiG-29 vs F-16" onkeydown="checkEnter(event)">
    <button onclick="ask()">Ask</button>
</div>

<script>
function checkEnter(event){
    if(event.key === "Enter"){
        ask();
    }
}

async function ask() {
    let q = document.getElementById("question").value;
    if(!q) return;
    let chatbox = document.getElementById("chatbox");
    chatbox.innerHTML += `<div class="user-msg">${q}</div>`;
    document.getElementById("question").value = "";

    let res = await fetch("/ask",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({question:q})
    });
    let data = await res.json();
    let imgHTML = data.image ? `<img src="${data.image}" alt="Plane Image">` : "";
    chatbox.innerHTML += `<div class="ai-msg">${data.answer}${imgHTML}</div>`;
    chatbox.scrollTop = chatbox.scrollHeight;
}
</script>
</body>
</html>
