<!DOCTYPE html>
<html>
<head>
<title>GoAI</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

#chatbox{
width:600px;
height:80vh;
background:#1e293b;
border-radius:12px;
display:flex;
flex-direction:column;
overflow:hidden;
}

#messages{
flex:1;
padding:20px;
overflow-y:auto;
}

.message{
margin-bottom:15px;
max-width:80%;
padding:12px;
border-radius:10px;
}

.user{
background:#3b82f6;
align-self:flex-end;
}

.ai{
background:#334155;
}

#inputarea{
display:flex;
padding:10px;
background:#0f172a;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:8px;
}

button{
margin-left:10px;
padding:10px 15px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
}

img{
margin-top:10px;
border-radius:10px;
max-width:100%;
}

</style>

</head>

<body>

<div id="chatbox">

<div id="messages"></div>

<div id="inputarea">
<input id="question" placeholder="Ask about a plane...">
<button onclick="ask()">Send</button>
</div>

</div>

<script>

function addMessage(text,type,image=null){

let messages=document.getElementById("messages");

let msg=document.createElement("div");

msg.classList.add("message");
msg.classList.add(type);

msg.textContent=text;

messages.appendChild(msg);

if(image){

let img=document.createElement("img");
img.src=image;

messages.appendChild(img);

}

messages.scrollTop=messages.scrollHeight;

}

async function ask(){

let input=document.getElementById("question");

let q=input.value;

if(!q)return;

addMessage(q,"user");

input.value="";

let typing=document.createElement("div");
typing.classList.add("message","ai");
typing.textContent="GoAI is thinking...";

document.getElementById("messages").appendChild(typing);

let res=await fetch("/ask",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({question:q})
});

let data=await res.json();

typing.remove();

addMessage(data.answer,"ai",data.image);

}

</script>

</body>
</html>
